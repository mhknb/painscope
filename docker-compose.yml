services:
  painscope-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    image: painscope:latest
    container_name: painscope-mcp
    restart: unless-stopped
    entrypoint: ["sh", "-c"]
    command: >
      painscope mcp-serve --host 0.0.0.0 --port 8765 &
      exec painscope web-serve --host 0.0.0.0 --port 8787
    ports:
      - "${MCP_HOST_PORT:-8767}:8765"
      - "${WEB_BIND_IP:-127.0.0.1}:8787:8787"
    environment:
      DATA_DIR: /data
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      XPOZ_API_KEY: ${XPOZ_API_KEY:-}
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY:-}
      PRODUCTHUNT_API_KEY: ${PRODUCTHUNT_API_KEY:-}
      PRODUCTHUNT_API_SECRET: ${PRODUCTHUNT_API_SECRET:-}
      LLM_MODEL_TR: ${LLM_MODEL_TR:-openai/gpt-oss-20b:free}
      LLM_MODEL_EN: ${LLM_MODEL_EN:-openai/gpt-oss-20b:free}
      LLM_MODEL_FALLBACK: ${LLM_MODEL_FALLBACK:-openai/gpt-oss-20b:free}
      PAINSCOPE_WEB_PASSWORD: ${PAINSCOPE_WEB_PASSWORD:-}
    volumes:
      - painscope_data:/data
      - painscope_hf_cache:/opt/hf_cache
    healthcheck:
      test:
        - "CMD"
        - "python"
        - "-c"
        - |
          import urllib.request, json
          req = urllib.request.Request(
            'http://localhost:8765/mcp',
            data=json.dumps({'jsonrpc':'2.0','id':1,'method':'tools/list','params':{}}).encode(),
            headers={
              'Content-Type': 'application/json',
              'Accept': 'application/json, text/event-stream',
              'MCP-Protocol-Version': '2025-03-26'
            }
          )
          urllib.request.urlopen(req, timeout=5)
          urllib.request.urlopen('http://localhost:8787/api/health', timeout=5)
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

volumes:
  painscope_data:
  painscope_hf_cache:
